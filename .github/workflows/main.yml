name: Build and Release Android APK

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: "35"
  ANDROID_BUILD_TOOLS: "35.0.0"
  ANDROID_NDK_VERSION: "27.2.12479018"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "false"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify buildozer.spec
        shell: bash
        run: |
          set -euo pipefail
          test -f buildozer.spec
          echo "buildozer.spec found"
          grep -E '^(title|package.name|version|requirements|android.api|android.arch)\s*=' buildozer.spec || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            unzip \
            zip \
            wget \
            curl \
            openjdk-17-jdk \
            python3-dev \
            libffi-dev \
            libssl-dev \
            ccache

      - name: Cache Buildozer and Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
            .buildozer/android/platform
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec', 'requirements.txt', 'pyproject.toml', 'setup.py', '**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-
            ${{ runner.os }}-buildozer-

      - name: Install Python packages
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython pexpect flet requests

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set Android environment
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk" >> "$GITHUB_ENV"
          echo "$HOME/.buildozer/android/platform/android-sdk/platform-tools" >> "$GITHUB_PATH"
          echo "$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Write SDK license hashes
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.buildozer/android/platform/android-sdk/licenses"
          cat > "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license" <<'EOF'
          8933bad161af4178b1185d1a37fbf41ea5269c55
          d56f51874737515e19135a98a04b396736868846
          24333f8a63b6825ea9c5514f83c2829b004d1fee
          EOF
          cat > "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license" <<'EOF'
          8933bad161af4178b1185d1a37fbf41ea5269c55
          EOF

      - name: Install Android packages with NDK fallback
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          export ANDROID_HOME="$SDK_ROOT"

          NDK_PRIMARY="${ANDROID_NDK_VERSION}"
          NDK_FALLBACKS="27.0.12077973 26.1.10909125 25.2.9519653"

          install_ndk() {
            for ver in $NDK_PRIMARY $NDK_FALLBACKS; do
              if sdkmanager --sdk_root="$SDK_ROOT" "ndk;$ver" >/dev/null 2>&1; then
                echo "ANDROID_NDK_ROOT=$SDK_ROOT/ndk/$ver" >> "$GITHUB_ENV"
                echo "Selected NDK: $ver"
                return 0
              fi
            done
            return 1
          }

          yes | sdkmanager --sdk_root="$SDK_ROOT" --licenses || true
          sdkmanager --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "cmdline-tools;latest" || true

          install_ndk || {
            echo "ERROR: No compatible NDK could be installed."
            exit 1
          }

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bin
          buildozer -v android debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Validate APK
        shell: bash
        run: |
          set -euo pipefail
          APK_FILE="$(find bin -maxdepth 1 -name '*.apk' | head -n 1)"
          test -n "$APK_FILE"
          ls -lh "$APK_FILE"
          unzip -t "$APK_FILE" >/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          artifacts: bin/*.apk
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Android APK automatic release
            Commit: ${{ github.sha }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
