name: Build and Release Android APK

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: "35"
  ANDROID_BUILD_TOOLS: "35.0.0"
  ANDROID_NDK_PRIMARY: "28.0.12433566"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "false"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify buildozer.spec
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f buildozer.spec ]; then
            echo "ERROR: buildozer.spec not found in repository root."
            exit 1
          fi
          echo "buildozer.spec found."
          grep -E '^(title|package.name|version|requirements|android.api|android.archs|android.accept_sdk_license)\s*=' buildozer.spec || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'pyproject.toml', 'setup.py', 'buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle manually
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle*', '**/settings.gradle*', '**/gradle-wrapper.properties', 'buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Buildozer and Android platform
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer/android/platform
          key: ${{ runner.os }}-android-${{ hashFiles('buildozer.spec', 'requirements.txt', 'pyproject.toml', 'setup.py') }}
          restore-keys: |
            ${{ runner.os }}-android-

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            unzip \
            zip \
            wget \
            curl \
            openjdk-17-jdk \
            python3-dev \
            libffi-dev \
            libssl-dev \
            ccache

      - name: Install Python packages
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython pexpect flet requests

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Android environment and sdkmanager symlink
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_ROOT/cmdline-tools/latest/bin"
          mkdir -p "$SDK_ROOT/tools/bin"

          if [ -x "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            ln -sf "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "$SDK_ROOT/tools/bin/sdkmanager"
          fi

          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "$SDK_ROOT/platform-tools" >> "$GITHUB_PATH"
          echo "$SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$SDK_ROOT/tools/bin" >> "$GITHUB_PATH"

      - name: Write Android licenses
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_ROOT/licenses"

          cat > "$SDK_ROOT/licenses/android-sdk-license" <<'EOF'
          8933bad161af4178b1185d1a37fbf41ea5269c55
          d56f51874737515e19135a98a04b396736868846
          24333f8a63b6825ea9c5514f83c2829b004d1fee
          EOF

          cat > "$SDK_ROOT/licenses/android-sdk-preview-license" <<'EOF'
          8933bad161af4178b1185d1a37fbf41ea5269c55
          EOF

          ls -lah "$SDK_ROOT/licenses"

      - name: Install Android packages with NDK fallback
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          export ANDROID_HOME="$SDK_ROOT"
          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$SDK_ROOT/tools/bin:$SDK_ROOT/platform-tools:$PATH"

          candidates=(
            "${ANDROID_NDK_PRIMARY}"
            "28c"
            "27.2.12479018"
            "27.0.12077973"
            "26.1.10909125"
            "25.2.9519653"
          )

          yes | sdkmanager --sdk_root="$SDK_ROOT" --licenses || true
          sdkmanager --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "cmdline-tools;latest" || true

          selected_ndk=""
          for ndk in "${candidates[@]}"; do
            if sdkmanager --sdk_root="$SDK_ROOT" "ndk;${ndk}" >/dev/null 2>&1; then
              selected_ndk="$SDK_ROOT/ndk/${ndk}"
              break
            fi
          done

          if [ -z "$selected_ndk" ]; then
            echo "ERROR: Unable to install any compatible NDK."
            exit 1
          fi

          echo "ANDROID_NDK_ROOT=$selected_ndk" >> "$GITHUB_ENV"
          echo "Selected NDK: $selected_ndk"

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bin
          buildozer -v android debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Validate APK
        shell: bash
        run: |
          set -euo pipefail
          APK_FILE="$(find bin -maxdepth 1 -name '*.apk' | head -n 1)"
          if [ -z "${APK_FILE:-}" ]; then
            echo "ERROR: no APK found in bin/"
            ls -lah bin || true
            exit 1
          fi
          echo "APK: $APK_FILE"
          ls -lh "$APK_FILE"
          unzip -t "$APK_FILE" >/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error
          compression-level: 0

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          artifacts: bin/*.apk
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generateReleaseNotes: true
          body: |
            Android APK automatic release
            Commit: ${{ github.sha }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Build summary
        if: always()
        shell: bash
        run: |
          echo "Workflow status: ${{ job.status }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if ls bin/*.apk >/dev/null 2>&1; then
            echo "APK generated successfully."
            ls -lh bin/*.apk
          else
            echo "APK not generated."
          fi
