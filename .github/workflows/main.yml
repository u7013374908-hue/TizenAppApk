name: Build TizenCommander APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev \
            default-jdk \
            android-sdk-build-tools \
            git \
            wget \
            unzip \
            ccache

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          ndk-version: 27.b
          build-tools-version: 35.0.0

      - name: Configure Android environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.b" >> $GITHUB_ENV
          echo "$ANDROID_HOME/tools:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            buildozer \
            cython \
            flet \
            requests \
            pexpect

      - name: Verify buildozer.spec
        run: |
          if [ ! -f buildozer.spec ]; then
            echo "ERROR: buildozer.spec not found!"
            exit 1
          fi
          echo "✓ buildozer.spec found"
          echo "Configuration:"
          grep -E "^(title|package.name|version|android.api|android.arch)" buildozer.spec || true

      - name: Build APK
        run: |
          mkdir -p bin
          buildozer android debug \
            --verbose \
            --require="python3,flet,requests"
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Verify APK build
        run: |
          echo "=== Checking APK output ==="
          ls -lh bin/*.apk 2>/dev/null || {
            echo "ERROR: No APK found in bin/"
            ls -la bin/
            exit 1
          }

          APK_FILE=$(ls bin/*.apk | head -1)
          echo "✓ APK built: $APK_FILE"
          echo "Size: $(du -h "$APK_FILE" | cut -f1)"

          if unzip -t "$APK_FILE" > /dev/null 2>&1; then
            echo "✓ APK integrity verified"
          else
            echo "ERROR: APK integrity check failed"
            exit 1
          fi

      - name: Extract APK information
        run: |
          APK_FILE=$(ls bin/*.apk | head -1)
          echo "=== APK Information ==="
          echo "File: $(basename $APK_FILE)"
          echo "Size: $(du -h $APK_FILE | cut -f1)"
          echo "MD5: $(md5sum $APK_FILE | cut -d' ' -f1)"
          echo "SHA256: $(sha256sum $APK_FILE | cut -d' ' -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: tizencommander-apk-debug
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          artifacts: bin/*.apk
          tag: v1.0.0-${{ github.run_number }}
          body: |
            ## TizenCommander APK Release

            **Build**: ${{ github.run_number }}
            **Commit**: ${{ github.sha }}
            **Branch**: ${{ github.ref }}

            ### Build Information
            - **Java**: Temurin JDK 17
            - **Android API**: 35
            - **NDK**: 27.b
            - **Architecture**: arm64-v8a

            ### Installation Instructions
            ```bash
            adb install -r tizencommander-1.0-debug.apk
            ```

            ### Features
            - ✓ SDB Protocol Handler with auto-reconnection
            - ✓ App Deployment with package extraction
            - ✓ Force Reinstall capability
            - ✓ Virtual Console with color logging
            - ✓ System Info and App Management

            ### Permissions
            - INTERNET (SDB communication)
            - READ/WRITE_EXTERNAL_STORAGE (file access)
            - REQUEST_INSTALL_PACKAGES (app management)

      - name: Build summary
        if: always()
        run: |
          echo "=== BUILD SUMMARY ==="
          echo "Status: ${{ job.status }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -f bin/*.apk ]; then
            echo "✓ APK successfully built"
            ls -lh bin/*.apk
          else
            echo "✗ APK build failed"
            exit 1
          fi

      - name: Collect build logs on failure
        if: failure()
        run: |
          echo "=== Build Environment ==="
          echo "Java version:"
          java -version || true

          echo -e "\n=== Python version ==="
          python --version || true

          echo -e "\n=== Buildozer version ==="
          buildozer --version || true

          echo -e "\n=== Android SDK ==="
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"

          echo -e "\n=== Build directory contents ==="
          ls -la .buildozer/android/platform/build-*/build/ 2>/dev/null || echo "Build dir not yet created"

          echo -e "\n=== Last 100 lines of build output ==="
          tail -n 100 .buildozer/android/platform/build-*/build.log 2>/dev/null || echo "Build log not found"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/
          retention-days: 7

# (End of workflow)
